# This file defines the Kubernetes Deployment for the SWE645 HW2 survey application.
# It maintains 3 replica pods at all times using the yalsakba/swe645-hw2 Docker image.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: swe645-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: swe645-app
  template:
    metadata:
      labels:
        app: swe645-app
    spec:
      containers:
      - name: swe645-container
        image: yalsakba/swe645-hw2:latest
        ports:
        - containerPort: 80